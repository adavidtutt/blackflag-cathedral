name: Validate Architecture

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate subsystem graph
        run: python3 scripts/sync_subsystem_surfaces.py && python3 scripts/validate_subsystems.py

      - name: Export subsystem graph
        run: python3 scripts/export_subsystem_graph.py

      - name: Check generated architecture surfaces are committed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git status --short
            exit 1
          fi
